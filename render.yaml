services:
  - type: web
    name: sh2-audio-streamer
    env: node
    plan: free # Can be upgraded to standard or pro
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: DATABASE_URL
        sync: false # Set this in the Render Dashboard
      - key: SESSION_SECRET
        generateValue: true
      - key: VITE_SUPABASE_URL
        sync: false # Set this in the Render Dashboard
      - key: VITE_SUPABASE_ANON_KEY
        sync: false # Set this in the Render Dashboard
